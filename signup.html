<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Registration | National Digital Governance Portal</title>
    <meta name="description" content="Register an official citizen account to access the digital locker, file taxes, or request administrative licenses online.">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts & Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div class="cursor-dot"></div><div class="cursor-ring"></div><div id="scroll-progress"></div>

    <!-- Page Loader -->
    <div id="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="container top-bar-content">
            <div class="top-bar-left">
                <span><i class="fa-solid fa-phone"></i> Helpline: 1800-11-2026</span>
                <span><i class="fa-solid fa-envelope"></i> contact@gov.in</span>
            </div>
            <div class="top-bar-right">
                <span><i class="fa-solid fa-globe"></i> Language: </span>
                <select id="lang-select">
                    <option value="en">English</option>
                    <option value="hi">à¤¹à¤¿à¤¨à¥à¤¦à¥€</option>
                    <option value="es">EspaÃ±ol</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Main Navigation Header -->
    <header class="main-header">
        <div class="container header-container">
            <div class="logo-area">
                <a href="index.html">
                    <img src="images/logo.webp" alt="Government Portal Logo" id="logo">
                </a>
            </div>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="services.html" class="nav-link">Services</a></li>
                    <li class="nav-item"><a href="project.html" class="nav-link">Projects</a></li>
                    <li class="nav-item"><a href="blog.html" class="nav-link">News</a></li>
                    <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
                    <li class="nav-item"><a href="login.html" class="header-btn"><i class="fa-solid fa-user-shield"></i> Citizen Portal</a></li>
                </ul>
            </nav>
            <div class="menu-toggle">
                <i class="fa-solid fa-bars"></i>
            </div>
        </div>
    </header>

    

    <!-- SECTION 3: Auth Form Section -->
    <section class="auth-form-section" style="background: var(--bg-main); padding-top: 0; padding-bottom: 80px;">
        <div class="container">
            <div class="auth-container animate-on-scroll">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2>Citizen Sign Up</h2>
                        <p>Register to unlock secure online municipal operations</p>
                    </div>
                    
                    <form id="signup-form">
                        <div class="form-group">
                            <label for="signup-name">Full Legal Name</label>
                            <input type="text" id="signup-name" class="form-control" placeholder="E.g. Sarah Johnson" required>
                        </div>
                        <div class="form-group">
                            <label for="signup-email">Email Address</label>
                            <input type="email" id="signup-email" class="form-control" placeholder="E.g. citizen@gmail.com" required>
                        </div>
                        <div class="form-group">
                            <label for="signup-password">Create Secure Password</label>
                            <input type="password" id="signup-password" class="form-control" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required minlength="6">
                        </div>
                        <label class="form-check">
                            <input type="checkbox" id="signup-agree" required>
                            <span>I agree to the <a href="#" style="color: var(--secondary-dark); font-weight: 600;">Citizen Data Charter</a>.</span>
                        </label>
                        <button type="submit" class="btn btn-primary btn-glow ripple-effect" style="width: 100%; margin-top: 20px;">Register Account</button>
                    </form>
                    
                    <div class="auth-links" style="justify-content: center; gap: 10px;">
                        <span>Already registered?</span>
                        <a href="login.html">Sign In Here</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    

    <!-- Back to Top & Scripts -->
    <div id="back-to-top"><i class="fa-solid fa-arrow-up"></i></div>
    <script src="js/script.js"></script>
</body>
</html>
