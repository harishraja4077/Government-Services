<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Registration | National Digital Governance Portal</title>
    <meta name="description" content="Register an official citizen account to access the digital locker, file taxes, or request administrative licenses online.">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts & Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
<div class="cursor-dot"></div><div class="cursor-ring"></div><div id="scroll-progress"></div>

    <!-- Page Loader -->
    <div id="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="container top-bar-content">
            <div class="top-bar-left">
                <span><i class="fa-solid fa-phone"></i> Helpline: 1800-11-2026</span>
                <span><i class="fa-solid fa-envelope"></i> contact@gov.in</span>
            </div>
            <div class="top-bar-right">
                <span><i class="fa-solid fa-globe"></i> Language: </span>
                <select id="lang-select">
                    <option value="en">English</option>
                    <option value="hi">à¤¹à¤¿à¤¨à¥à¤¦à¥€</option>
                    <option value="es">EspaÃ±ol</option>
                </select>
            </div>
        </div>
    </div>

    
    

    <!-- SECTION 3: Auth Form Section -->
    <section class="auth-form-section" style="background: linear-gradient(rgba(10, 15, 30, 0.7), rgba(10, 15, 30, 0.9)), url('images/login_bg.png') center/cover no-repeat; padding-top: 60px; padding-bottom: 80px; min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative;">
        <div class="container">
            <div class="auth-container animate-on-scroll">
                <div class="auth-box">
                    <div class="auth-left">
                        <div class="brand"><a href="index.html"><img src="images/logo.webp" alt="Gov Logo"></a></div>
                        <h1>Create Account</h1>
                        <p>Join millions of citizens using secure digital services. Register once and access multiple government applications seamlessly.</p>
                        <div class="auth-hero-image"><img src="images/team.webp" alt="Register image"></div>
                    </div>

                    <div class="auth-right">
                        <div class="auth-card">
                            <div class="auth-header">
                                <h2>Sign Up</h2>
                                <p>Create your citizen account</p>
                            </div>
                            <form id="signup-form">
                                <div class="form-group">
                                    <label for="signup-name">Full Legal Name</label>
                                    <input type="text" id="signup-name" class="form-control" placeholder="Enter Your Name" required>
                                </div>
                                <div class="form-group">
                                    <label for="signup-email">Email Address</label>
                                    <input type="email" id="signup-email" class="form-control" placeholder="Enter Your Email" required>
                                </div>
                                <div class="form-group">
                                    <label for="signup-password">Create Secure Password</label>
                                    <input type="password" id="signup-password" class="form-control" placeholder="Enter Password" required minlength="6">
                                </div>
                                <label class="form-check">
                                    <input type="checkbox" id="signup-agree" required>
                                    <span>I agree to the <a href="#" style="color: var(--secondary-dark); font-weight: 600;">Citizen Data Charter</a>.</span>
                                </label>
                                <button type="submit" class="btn btn-primary btn-glow ripple-effect" style="width: 100%; margin-top: 20px;">Register Account</button>
                            </form>
                            <div class="auth-links" style="justify-content: center; gap: 10px; margin-top:16px;">
                                <span>Already registered?</span>
                                <a href="login.html">Sign In Here</a>
                            </div>
                            <div style="margin-top:12px; text-align:center;"><a href="index.html">Back to Home</a></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    

    <!-- Back to Top & Scripts -->
    <div id="back-to-top"><i class="fa-solid fa-arrow-up"></i></div>
    <script src="js/script.js"></script>
</body>
</html>
